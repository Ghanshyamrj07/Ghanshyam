<style>

.hero{

.hero img{

.icons a{

}

.icons a:hover{

}

.section{
padding:80px 20px;
max-width:800px;
margin:auto;
}

.card{
background:#111;
padding:30px;
margin:20px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff004c;
}

</style>

</head>

<body>

<div class="hero">

</div>

</div>

<div class="section">

<p>
Main AI content aur YouTube shorts banata hu.
</p>

</div>

<div class="section">

<div class="card">

<p>Cinematic AI videos create kiye.</p>
</div>

<div class="card">
<h3>YouTube Shorts</h3>
<p>Viral shorts content.</p>
</div>

</div>

<script>

var text = [
"Content Creator",
"AI Creator",
"YouTube Shorts Creator"
];

var count=0;
var index=0;
var current="";
var letter="";

(function type(){

if(count===text.length){
count=0;
}

current=text[count];
letter=current.slice(0,++index);

document.querySelector(".typing").textContent=letter;

if(letter.length===current.length){
count++;
index=0;
}

setTimeout(type,120);

})();

</script>

</body>
