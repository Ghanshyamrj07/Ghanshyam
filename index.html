<style>

body{
margin:0;
padding:0;
background:black;
font-family:'Orbitron',sans-serif;
color:white;
text-align:center;
overflow:hidden;
}

/* Neon Background Lights */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 20% 30%,#ff004c55,transparent),
radial-gradient(circle at 80% 70%,#00ffff55,transparent),
radial-gradient(circle at 50% 50%,#ff00ff55,transparent);
animation:moveLights 8s infinite alternate;
z-index:-1;
}

@keyframes moveLights{
0%{transform:scale(1);}
100%{transform:scale(1.3);}
}

/* Profile */

.profile img{
width:160px;
height:160px;
border-radius:50%;
border:5px solid #ff004c;
box-shadow:0 0 30px #ff004c,0 0 60px #ff004c;
margin-top:80px;
}

/* Name Neon */

h1{
font-size:50px;
margin:20px 0;
color:#fff;
text-shadow:
0 0 10px #ff004c,
0 0 20px #ff004c,
0 0 40px #ff004c,
0 0 80px #ff004c;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #ff004c;}
to{ text-shadow:0 0 40px #ff004c,0 0 80px #ff004c;}
}

/* Social Icons */

.icons{
margin-top:30px;
}

.icons a{
display:inline-block;
margin:15px;
font-size:30px;
color:white;
transition:0.3s;
}

.icons a:hover{
color:#ff004c;
transform:scale(1.4);
text-shadow:0 0 20px #ff004c;
}

/* Projects */

.projects{
margin-top:120px;
font-size:35px;
text-shadow:0 0 20px cyan;
}
