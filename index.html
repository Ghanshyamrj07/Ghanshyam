<style>

body{
margin:0;
padding:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
}

/* background neon */

body{
background:linear-gradient(90deg,#000000,#42002b,#000000);
background-size:400% 400%;
animation:bgmove 6s infinite;
}

@keyframes bgmove{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* profile image */

.profile img{
width:170px;
height:170px;
border-radius:50%;
margin-top:80px;
border:5px solid #ff0055;
box-shadow:0 0 25px #ff0055,0 0 60px #ff0055;
}

/* name */

h1{
font-size:48px;
margin:20px 0;
text-shadow:0 0 15px #ff0055,0 0 40px #ff0055;
}

/* icons */

.icons{
display:flex;
justify-content:center;
gap:50px;
margin-top:30px;
}

.icons a{
font-size:40px;
color:white;
transition:0.3s;
}

.icons a:hover{
transform:scale(1.3);
color:#ff0055;
text-shadow:0 0 20px #ff0055;
}

/* projects */

.projects{
margin-top:120px;
font-size:36px;
text-shadow:0 0 20px cyan;
}

</style>

</head>

<body>

<div class="profile">
<img src="https://img.sanishtech.com/u/9a42656f92fc34aa14461b699d873aa1.jpg">
</div>

</a>

</a>

<a href="mailto:example@gmail.com">
<i class="fa-solid fa-envelope"></i>
</a>

</div>
